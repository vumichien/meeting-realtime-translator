name: Release Desktop App

# Pushing a version tag is the supported trigger. GitHub's "Releases" UI does not run this workflow
# by itself — create a tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-15-intel]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # No npm cache: root lockfiles are gitignored (see .gitignore); cache: npm requires package-lock.json.

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libarchive-tools

      - name: Disable macOS signing auto-discovery
        if: matrix.os == 'macos-15-intel'
        run: echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build desktop artifacts
        run: npm run app:build

      - name: Upload Windows installer(s)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-windows
          path: desktop/dist/*.exe
          if-no-files-found: error

      - name: Upload Linux AppImage(s)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-linux
          path: desktop/dist/*.AppImage
          if-no-files-found: error

      - name: Upload macOS DMG
        if: matrix.os == 'macos-15-intel'
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-macos
          path: desktop/dist/*.dmg
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write release body from changelog
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/build-github-release-body.py --tag "${{ github.ref_name }}"

      - name: Download built installers
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          # Do not use generate_release_notes: re-running this workflow on the same tag stacks
          # duplicate "What's Changed" blocks. Body is built once from docs/project-changelog.md.
          body_path: release-body.md
          fail_on_unmatched_files: true
          files: release-assets/*
