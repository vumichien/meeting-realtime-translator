appId: com.babelmic.app
productName: Babel Mic
icon: build/icon.png
npmRebuild: false
asar: true
# electron-builder runs with `desktop/` as projectDir (npm workspace), so it cannot read the repo
# root `.git/config`. Without an explicit publish config it still tries to build electron-updater
# metadata and crashes with "Cannot read properties of null (reading 'provider')". Releases are
# uploaded by CI (softprops/action-gh-release), not electron-builder's publisher.
publish: null
directories:
  output: dist
files:
  - out/**/*
  - package.json
extraResources:
  - from: ../server/dist
    to: server/dist
  - from: ../client/dist
    to: client/dist
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: AudioVideo
